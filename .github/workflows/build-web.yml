# Se asume que la raíz del repositorio es la carpeta `automation` (este proyecto).
# Si en tu repo la app está anidada, ajusta `working-directory` (por ejemplo: FORMATOS FORMULARIOS/automation/web).
name: Build web
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
